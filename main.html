<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Розклад змагань — покращено</title>
<style>
:root{
  --bg: #0b1220;
  --card: rgba(255,255,255,0.04);
  --muted: rgba(255,255,255,0.6);
  --text: #e6eef8;
  --accent: #2563eb;
  --gold: #facc15;
  --radius: 10px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: "Inter", system-ui, Arial, sans-serif;
  background: linear-gradient(180deg,#071026 0%, var(--bg) 100%);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding:24px;
}

/* Контейнер і контроли */
.controls{
  max-width:1000px;
  margin:0 auto 14px;
  display:flex;
  gap:10px;
  align-items:center;

  /* Примусово зберігаємо рядкову структуру навіть на мобайлі */
  flex-direction:row !important;
  flex-wrap:nowrap !important;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
.file-label{
  background:linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.04);
  padding:8px 12px;
  border-radius:8px;
  display:inline-flex;
  gap:8px;
  align-items:center;
}
.file-label input{display:none}
.small{
  font-size:13px;
  color:var(--muted);
}
#sheetData{
  max-width:1000px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:10px;

  /* Дозволяємо горизонтальну прокрутку замість того, щоб "ламати" верстку */
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}

/* Всі рядки */
.sheet-row {
  display: flex;
  gap: 10px;
  padding: 12px 16px; /* однаковий padding для всіх */
  background: var(--card);
  border-radius: var(--radius);
  align-items: center; /* вертикальне вирівнювання вмісту */
  flex-direction: row !important;
  flex-wrap: nowrap !important;
  transition: transform .12s ease, box-shadow .12s ease;
  border:1px solid rgba(255,255,255,0.03);
  min-height:48px; /* фіксована мінімальна висота рядка */
}

/* Заголовок */
.sheet-row.header {
  background: linear-gradient(90deg, var(--accent), #1346d6);
  color: #fff;
  font-weight:600;
  border: none;
  align-items: center; /* вертикально по центру */
  min-width: max-content;
}

/* Комірки */
.sheet-cell {
  flex: 1 1 auto;
  min-width: 150px; /* або під вашу кількість колонок */
  padding: 12px 16px;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: break-word;
  line-height: 1.35;
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: center; /* вирівнювання вмісту по центру вертикально */
}

/* Комірки заголовка */
.sheet-row.header .sheet-cell {
  color: #fff;
  font-weight: 600;
  display: flex;
  align-items: center; /* вертикально по центру */
  justify-content: flex-start; /* текст по лівому краю */
  padding: 12px 16px;
}

/* Зебра-рядки для читабельності (не застосовується до header) */
.sheet-row:not(.header):nth-child(even){
  background: rgba(255,255,255,0.02);
}

/* Рядки-банери */
.sheet-row.event-row{
  padding:12px 16px;
  background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
  justify-content:flex-start;
}
.sheet-row.event-row .event{
  flex: 1 1 100%;
  font-weight:700;
  color:var(--gold);
  font-size:15px;
  letter-spacing:.2px;
}

/* ===========================
   ВАЖЛИВЕ: призупиняємо адаптивність
   ===========================
   Якщо у вас був медіа-блок для max-width:680px — видаліть його.
   Якщо немає змоги видалити, можна перекрити правила тут (вже зроблено через !important / фіксовані min-width).
*/

/* Простенька підказка коли контейнер порожній */
.empty{
  padding:18px;
  border-radius:10px;
  background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  color:var(--muted);
  text-align:center;
}
</style>
</head>
<body>

<div class="controls">
  <label class="file-label" title="Завантажити CSV">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="opacity:.9">
      <path d="M12 3v12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 7l4-4 4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="3" y="15" width="18" height="6" rx="2" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    <span class="small">Завантажити CSV</span>
    <input id="fileInput" type="file" accept=".csv,text/csv" />
  </label>

  <div class="small">Підтримуються лапки в полях, коми всередині полів, та рядки-банери типу <code>Забіг 1</code>.</div>
</div>

<div id="sheetData" class="empty">Завантажте CSV файл — він з'явиться тут у вигляді листа.</div>

<script>
/* Надійний простий CSV-парсер: підтримує лапки (") та перенос рядків всередині лапок */
function parseCSV(text){
  const rows = [];
  let cur = '';
  let row = [];
  let inQuotes = false;
  let i = 0;
  while (i < text.length){
    const ch = text[i];

    if (ch === '"'){
      if (inQuotes && text[i+1] === '"'){ // подвійні лапки -> один символ "
        cur += '"';
        i += 2;
        continue;
      }
      inQuotes = !inQuotes;
      i++;
      continue;
    }

    if (!inQuotes && (ch === ',')){
      row.push(cur);
      cur = '';
      i++;
      continue;
    }

    // Новий рядок (LF or CRLF)
    if (!inQuotes && (ch === '\n' || ch === '\r')){
      // якщо CRLF — пропустимо наступний символ \n після \r
      if (ch === '\r' && text[i+1] === '\n'){ i++; }
      row.push(cur);
      rows.push(row);
      row = [];
      cur = '';
      i++;
      continue;
    }

    cur += ch;
    i++;
  }

  // останній рядок
  if (cur.length > 0 || row.length > 0){
    row.push(cur);
    rows.push(row);
  }

  // Обрізаємо пробіли навколо (не зсередини лапок)
  return rows.map(r => r.map(cell => cell));
}

/* Відобразити CSV */
function displayCSV(data){
  const rows = parseCSV(data);
  const container = document.getElementById('sheetData');
  container.innerHTML = '';
  if (!rows.length){
    container.className = 'empty';
    container.textContent = 'Файл порожній або не вдалося розпарсити CSV.';
    return;
  } else {
    container.classList.remove('empty');
  }

  // вирахуємо максимальну кількість колонок (щоб заповнювати пустими)
  const maxCols = rows.reduce((m,r) => Math.max(m, r.length), 0);

  rows.forEach((row, idx) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'sheet-row';

    // Якщо перший рядок — заголовок (припускаємо, що користувач хоче)
    if (idx === 0){
      rowDiv.classList.add('header');
    }

    // Якщо це рядок-банер "Забіг ..." — зробимо його event-row і один великий спан
    const firstCellTrim = (row[0] || '').trim();
    if (/^Забіг\s*/i.test(firstCellTrim)){
      rowDiv.classList.add('event-row');
      const span = document.createElement('span');
      span.className = 'event';
      span.textContent = firstCellTrim;
      // зайняти всю ширину
      span.style.display = 'block';
      span.style.minWidth = '0';
      rowDiv.appendChild(span);
      container.appendChild(rowDiv);
      return;
    }

    // Нормальний рядок: створюємо стільки комірок, скільки потрібно
    for (let c = 0; c < maxCols; c++){
      const cellDiv = document.createElement('div');
      cellDiv.className = 'sheet-cell';
      // Якщо комірки менше, ставимо пусту
      const raw = row[c] !== undefined ? row[c] : '';
      // Trim тільки кінець/початок — але не внутрішні пробіли
      cellDiv.textContent = raw;
      rowDiv.appendChild(cellDiv);
    }

    container.appendChild(rowDiv);
  });
}

/* Читання локального файлу */
document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const text = evt.target.result;
    displayCSV(text);
  };
  // Явно читаємо у вигляді тексту з підтримкою різних кодувань — браузер сам визначить
  reader.readAsText(file);
});

/* Для прикладу: якщо ви хочете початково показати приклад CSV (закоментуйте за потреби) */
// const sample = 'Ім’я,Команда,Результат\\nІванов,Team A,12:34\\nПетренко,Team B,"Дуже довгий коментар, що містить, коми та продовжується на кілька слів, щоб показати перенос"\\nЗабіг 1';
// displayCSV(sample);
</script>

</body>
</html>
